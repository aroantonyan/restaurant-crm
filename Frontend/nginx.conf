# Restaurant CRM — nginx site config
#
# Serves the Vite-built SPA from /usr/share/nginx/html and reverse-proxies the
# API and SignalR hub to the `api` service in docker-compose. The frontend
# bundle is configured to call /api/* on the same origin, so this nginx is the
# single edge for the whole app (no CORS, no mixed-content issues).

server {
    listen       80;        # rewritten to 8080 by the Dockerfile so we can drop root
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    server_tokens off;

    # ─── Caching policy ──────────────────────────────────────────────────
    # Hashed assets (Vite emits filenames like index-Bbg1esXJ.css): cache
    # forever, they're immutable.
    location ~* \.(?:js|mjs|css|svg|png|jpg|jpeg|gif|webp|avif|woff2?|ttf|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html should always revalidate so users get the latest bundle.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    # ─── API proxy ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Buffer settings appropriate for JSON payloads (not file uploads).
        proxy_buffering          on;
        proxy_buffer_size        16k;
        proxy_buffers            8 16k;
        proxy_read_timeout       60s;
        proxy_send_timeout       60s;
        proxy_connect_timeout    5s;
    }

    # ─── SignalR / WebSocket upgrade ─────────────────────────────────────
    # The OrderHub is mounted at /hubs/orders. SignalR negotiates over HTTP
    # then upgrades to WebSocket; nginx must pass the Upgrade headers and
    # use a long read timeout so the long-lived connection isn't reaped.
    location /hubs/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # ─── SPA fallback ────────────────────────────────────────────────────
    # Any path that isn't a real file falls through to index.html so
    # react-router can take over client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Hardening headers ───────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"              always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    # Conservative baseline. Tighten once every external asset is audited
    # (currently just the Inter font from Google Fonts).
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com data:; \
         img-src 'self' data: https:; \
         connect-src 'self' wss: https:; \
         frame-ancestors 'self'" always;

    # ─── 404 / error fallback ────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { internal; }
}
