name: restaurant-crm

# Local full-stack run — builds both images from source (no Docker Hub, no
# Caddy/TLS). Use this to smoke-test the production containers on your Mac:
#
#   docker compose up --build
#   → web on http://localhost:${WEB_PORT:-8080}, which proxies /api to the API
#
# Production deployment uses docker-compose.prod.yml instead (pulls prebuilt
# images + adds Caddy for HTTPS).

services:

  postgres:
    image: postgres:17-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-RestaurantDB}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      LANG: C.UTF-8
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [crm]

  api:
    image: aronaa/restaurantcrm-api:latest
    build:
      context: ./Backend/src
      dockerfile: Dockerfile
    container_name: crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-RestaurantDB};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD};Include Error Detail=false"
      JwtSettings__Secret:      ${JWT_SECRET:?Set JWT_SECRET in .env}
      JwtSettings__Issuer:      ${JWT_ISSUER:-RestaurantCRM}
      JwtSettings__Audience:    ${JWT_AUDIENCE:-RestaurantCRM}
      JwtSettings__ExpiryHours: ${JWT_EXPIRY_HOURS:-12}
    volumes:
      - api-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "4", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [crm]

  web:
    image: aronaa/restaurantcrm-web:latest
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: crm-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:8080"
    networks: [crm]

volumes:
  pgdata:
    name: crm-pgdata
  api-logs:
    name: crm-api-logs

networks:
  crm:
    name: crm-net
    driver: bridge
