name: restaurant-crm

# Production stack — runs on the server. Images are pulled from Docker Hub
# (built & pushed by .github/workflows/deploy.yml), never built here.
#
#   caddy (:80/:443, TLS)  →  web (nginx, SPA + /api proxy)  →  api  →  postgres
#
# Pin a specific build for rollback by exporting IMAGE_TAG in .env, e.g.
#   IMAGE_TAG=sha-1a2b3c4   (the CI also tags every build with its git SHA)
# Defaults to :latest.

services:

  postgres:
    image: postgres:17-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-RestaurantDB}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      LANG: C.UTF-8
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [crm]

  api:
    image: aronaa/restaurantcrm-api:${IMAGE_TAG:-latest}
    container_name: crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-RestaurantDB};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD};Include Error Detail=false"
      JwtSettings__Secret:      ${JWT_SECRET:?Set JWT_SECRET in .env}
      JwtSettings__Issuer:      ${JWT_ISSUER:-RestaurantCRM}
      JwtSettings__Audience:    ${JWT_AUDIENCE:-RestaurantCRM}
      JwtSettings__ExpiryHours: ${JWT_EXPIRY_HOURS:-12}
    volumes:
      - api-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "4", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s   # EF migrations run on boot — give them room
    networks: [crm]

  web:
    image: aronaa/restaurantcrm-web:${IMAGE_TAG:-latest}
    container_name: crm-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy   # don't serve until the API can answer
    # No ports exposed to host — Caddy proxies to this container internally.
    networks: [crm]

  caddy:
    image: caddy:2-alpine
    container_name: crm-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data         # stores the TLS certificate (persists across restarts)
      - caddy-config:/config
    depends_on:
      - web
    networks: [crm]

volumes:
  pgdata:
    name: crm-pgdata
  api-logs:
    name: crm-api-logs
  caddy-data:
    name: crm-caddy-data
  caddy-config:
    name: crm-caddy-config

networks:
  crm:
    name: crm-net
    driver: bridge
